[rtpengine]
# ---------------------------------------------------------------------------
# voip-test-rig media relay. Trimmed from the sipwise default:
#   https://github.com/sipwise/rtpengine/blob/master/etc/rtpengine.conf
#
# Two named interfaces let rtpengine BRIDGE media between the external and
# internal docker networks. Kamailio selects them with `direction=ext` /
# `direction=int` flags (see route[RTPENGINE] in kamailio.cfg).
#
# IMPORTANT: table = -1 runs rtpengine in USERSPACE-ONLY mode (no in-kernel
# xt_RTPENGINE module). GitHub runners don't provide that kernel module, and
# userspace forwarding needs no NET_ADMIN — fine for functional testing.
# ---------------------------------------------------------------------------

table = -1

# Multiple interfaces must be ONE semicolon-separated value: the config parser
# (glib keyfile) keeps only the last of duplicate keys, so two `interface =`
# lines would drop 'ext' ("Interface 'ext' not found, using default").
interface = ext/172.30.10.20;int/172.30.20.20

# ng control protocol + CLI on the internal leg (Kamailio reaches it here)
listen-ng  = 172.30.20.20:2223
listen-cli = 172.30.20.20:2224

port-min = 30000
port-max = 30100

# Foreground + stderr logging for container friendliness
foreground = true
log-stderr = true
log-level  = 6

# Demo defaults
delete-delay = 0
