; Service-URI dialplan for the rig. Kamailio routes INVITEs to
; moh / voicemail / ivr / attendant / ooo into this "public" context.
;
; Most announcements use Playtones() so they have ZERO dependency on sound-file
; packages and can never fail on a missing prompt — what matters for the test is
; that Asterisk answers and two-way media flows through rtpengine. The ooo
; extension additionally plays a real prompt (demo-congrats) from the
; asterisk-core-sounds-en-wav package the image installs for music-on-hold (see
; the Dockerfile). To use real prompts elsewhere, swap a Playtones line for
; Playback(<sound>).

[public]

exten => moh,1,Verbose(1,Rig: music-on-hold)
 same => n,Answer()
 same => n,Playtones(440+480)
 same => n,Wait(20)
 same => n,Hangup()

exten => voicemail,1,Verbose(1,Rig: voicemail)
 same => n,Answer()
 same => n,Playtones(440)
 same => n,Wait(3)
 same => n,Hangup()

exten => ivr,1,Verbose(1,Rig: ivr / auto-attendant)
 same => n,Answer()
 same => n,Playtones(350+440)
 same => n,Wait(3)
 same => n,Hangup()

; attendant is an alias for the IVR
exten => attendant,1,Goto(public,ivr,1)

exten => ooo,1,Verbose(1,Rig: out-of-office)
 same => n,Answer()
 same => n,Playback(demo-congrats)
 same => n,Playtones(480+620)
 same => n,Wait(3)
 same => n,Hangup()

; ---------------------------------------------------------------------------
; Subscriber-to-subscriber calls. Kamailio forces EVERY user-to-user INVITE
; through Asterisk (not just the service URIs above) so Asterisk owns the media
; path and can offer hold / music-on-hold now and barge-in etc. later. We bridge
; the call straight back out to the dialed user via Kamailio (the [kamailio]
; PJSIP endpoint), which performs the usrloc lookup and delivers to the
; registered contact. direct_media=no on that endpoint keeps us in the audio.
;
; Asterisk prefers explicit extensions over patterns, so the service URIs above
; are matched first; this pattern only catches actual subscriber names.
exten => _[a-z0-9].,1,Verbose(1,Rig: bridging subscriber call to ${EXTEN} via Kamailio)
 same => n,Dial(PJSIP/${EXTEN}@kamailio,60)
 same => n,Hangup()
