; Service-URI dialplan for the rig. Kamailio routes INVITEs to
; moh / voicemail / ivr / attendant / ooo into this "public" context.
;
; Announcements use Playtones() so the rig has ZERO dependency on sound-file
; packages and can never fail on a missing prompt — what matters for the test
; is that Asterisk answers and two-way media flows through rtpengine. To use
; real prompts instead, install an asterisk-core-sounds-* package and swap the
; Playtones lines for Playback(<sound>).

[public]

exten => moh,1,Verbose(1,Rig: music-on-hold)
 same => n,Answer()
 same => n,Playtones(440+480)
 same => n,Wait(20)
 same => n,Hangup()

exten => voicemail,1,Verbose(1,Rig: voicemail)
 same => n,Answer()
 same => n,Playtones(440)
 same => n,Wait(3)
 same => n,Hangup()

exten => ivr,1,Verbose(1,Rig: ivr / auto-attendant)
 same => n,Answer()
 same => n,Playtones(350+440)
 same => n,Wait(3)
 same => n,Hangup()

; attendant is an alias for the IVR
exten => attendant,1,Goto(public,ivr,1)

exten => ooo,1,Verbose(1,Rig: out-of-office)
 same => n,Answer()
 same => n,Playtones(480+620)
 same => n,Wait(3)
 same => n,Hangup()
