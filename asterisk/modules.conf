[modules]
; Deterministic, minimal module set. autoload=no keeps the log clean (the Debian
; default autoloads dozens of channel drivers and DB/LDAP/ARI/CDR/CEL/HEP backends
; that have no config or hardware here and only spew load errors). We load exactly
; the PJSIP stack + media + dialplan the rig needs. Answer/Hangup/Wait/Goto/Set are
; core builtins (no module required).
autoload=no

; --- PJSIP stack (chan_pjsip pulls in this whole set) ---
load => res_pjproject.so
load => res_sorcery_config.so
load => res_sorcery_memory.so
load => res_sorcery_astdb.so
load => res_pjsip.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_endpoint_identifier_ip.so      ; type=identify (match Kamailio by IP)
load => res_pjsip_endpoint_identifier_user.so
load => res_pjsip_session.so
load => res_pjsip_sdp_rtp.so
load => res_pjsip_caller_id.so
load => res_pjsip_rfc3326.so                     ; map SIP causes on BYE/CANCEL
load => res_pjsip_dtmf_info.so
load => res_pjsip_pubsub.so
load => chan_pjsip.so

; --- media ---
load => res_rtp_asterisk.so
load => res_timing_timerfd.so      ; timing source (also paces music-on-hold)
load => codec_ulaw.so
load => codec_alaw.so
load => format_pcm.so              ; read the ulaw hold prompt (no extra codec needed)

; --- music on hold: play a bundled example prompt to the held party when a call
; is put on hold. res_musiconhold drives it; bridge_holding provides the holding
; bridge the held leg is parked on while MoH plays. The prompt + class live in
; musiconhold.conf and the seeded /var/lib/asterisk/moh directory (see Dockerfile).
load => res_musiconhold.so
load => bridge_holding.so

; --- bridging: Dial() needs a bridge technology to connect the two call legs.
; bridge_simple is the 2-party bridge; loading only this (not bridge_native_rtp)
; keeps Asterisk anchored in the media path, which is the whole point here
; (music-on-hold today, barge-in later). Without it the bridge can't be created
; ("Could not create class basic. No technology to support it.") and Dial aborts
; the instant the callee answers, tearing both legs down.
load => bridge_simple.so

; --- dialplan + the apps used by extensions.conf ---
load => pbx_config.so
load => app_verbose.so
load => app_playtones.so
load => app_dial.so          ; Dial(): bridge subscriber-to-subscriber calls back via Kamailio
