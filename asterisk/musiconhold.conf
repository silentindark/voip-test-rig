; Music-on-hold for the rig. When a call is put on hold, Asterisk plays the held
; party an example prompt that ships with the Asterisk core sounds, on a loop.
;
; We use a wav-format sound (read by format_wav); codec_ulaw converts it to the
; G711 Asterisk speaks toward rtpengine, so no extra codec is needed (Debian's
; en core sounds ship as gsm/wav/g722 — there is no ulaw variant).
;
; The [default] class is the one PJSIP endpoints use when they don't name another
; (our kamailio endpoint doesn't), so an ordinary call-hold triggers this
; automatically. The directory is seeded with one bundled example prompt
; (demo-congrats) in the Dockerfile.
[default]
mode=files
directory=/var/lib/asterisk/moh
