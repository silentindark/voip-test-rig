; Minimal PJSIP config for the rig. Asterisk is the app/announcement server on
; the internal network; it trusts Kamailio (by source IP) and needs no auth.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; Endpoint representing the Kamailio proxy (the only thing that calls us, and
; the only place we dial back out to when bridging user-to-user calls).
[kamailio]
type=endpoint
context=public
disallow=all
allow=ulaw
allow=alaw
direct_media=no              ; stay in the media path (rtpengine bridges to us)
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
aors=kamailio                ; outbound: Dial(PJSIP/<user>@kamailio) targets this AOR
from_domain=rig.local        ; present our SIP domain on the bridged leg back out

; Where Dial(PJSIP/<user>@kamailio) sends the INVITE: Kamailio's internal-leg
; signaling socket. Kamailio then does the usrloc lookup and delivers the user.
[kamailio]
type=aor
contact=sip:172.30.20.10:5060

; Match incoming requests from Kamailio's internal-leg IP to that endpoint, so
; they land unauthenticated in the "public" dialplan context.
[kamailio]
type=identify
endpoint=kamailio
match=172.30.20.10
