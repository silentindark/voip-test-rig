# TLS profiles for Kamailio (used for sip:tls 5061 and the WSS 8443 listener).
# Certs are generated on-demand by certs/gen-certs.sh and mounted at /rig-certs.

[server:default]
method = TLSv1.2+
verify_certificate = no
require_certificate = no
private_key = /rig-certs/server.key
certificate = /rig-certs/server-chain.crt
ca_list = /rig-certs/ca.crt

[client:default]
method = TLSv1.2+
verify_certificate = no
require_certificate = no
