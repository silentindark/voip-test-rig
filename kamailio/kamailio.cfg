#!KAMAILIO
#
# voip-test-rig — Kamailio SIP proxy
# ----------------------------------
# - REGISTER + MySQL digest auth (subscriber table), user location (usrloc)
# - routes the special service URIs moh/voicemail/ivr/attendant/ooo to Asterisk
# - bridges media via rtpengine between the external and internal docker networks
# - terminates WSS (secure WebSocket) for the sip.js web client
#
# The IP addresses below are the FIXED docker-compose addresses. Keep them in
# sync with docker-compose.yml and the SANs in certs/gen-certs.sh.
#   external leg (agents, webapp): 172.30.10.10
#   internal leg (toward Asterisk): 172.30.20.10
#   rtpengine ng control:          172.30.20.20:2223
#   Asterisk:                      172.30.20.30:5060
#   mysql:                         172.30.20.40

#!substdef "!MYDOMAIN!rig.local!g"
#!substdef "!DBURL!mysql://kamailio:kamailiopw@172.30.20.40/kamailio!g"
#!substdef "!APP_SOCK!sip:172.30.20.30:5060!g"

# Single source of truth for "what is the internal network". Used by the
# FROMINTERNAL helper (on the source IP) and the rtpengine interface selection
# (on the destination IP) so no IP literals are scattered through the logic.
#!define INTERNAL_NET_RE "^172\.30\.20\."

#!define FLT_NATS 5
#!define FLT_WS   2
#!define FLB_NATB 6
# branch flag: this call bridges WebRTC <-> plain SIP
#!define FLB_RTPWS 8

####### Global Parameters #########
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=yes
children=4

/* SIP signaling on the external leg (agents + webapp) */
listen=udp:172.30.10.10:5060 advertise 172.30.10.10:5060
listen=tcp:172.30.10.10:5060
listen=tls:172.30.10.10:5061
listen=tls:172.30.10.10:8443   # WSS for the web client
/* internal leg toward Asterisk */
listen=udp:172.30.20.10:5060

enable_tls=yes
tcp_connection_lifetime=3605
tcp_accept_no_cl=yes
tcp_rd_buf_size=16384
auto_aliases=no
server_header="Server: voip-test-rig"

# Dual-homed: pick the source IP per destination (internal vs external leg) from
# the routing table. Without this, requests to Asterisk would leave the external
# socket, get SNAT'd to the internal docker gateway, and miss Asterisk's
# IP-based endpoint identify (-> "No matching endpoint found").
mhomed=1

####### Modules #########
# (module path uses the package's compiled-in default, arch-independent)

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "db_mysql.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "tls.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"

####### Module Parameters #########
# ----- ctl (kamcmd binrpc socket) -----
modparam("ctl", "binrpc", "unix:/run/kamailio/kamailio_ctl")

# ----- tm / rr -----
modparam("tm", "failure_reply_mode", 3)
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

# ----- registrar / usrloc (MySQL, domain-aware) -----
modparam("usrloc", "db_url", "DBURL")
modparam("usrloc", "db_mode", 1)
modparam("usrloc", "use_domain", 1)
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)

# ----- auth / auth_db: ha1 stored in DB (MD5(user:domain:pass)) -----
modparam("auth_db", "db_url", "DBURL")
modparam("auth_db", "calculate_ha1", 0)
modparam("auth_db", "password_column", "ha1")
modparam("auth_db", "use_domain", 1)
modparam("auth_db", "load_credentials", "")

# ----- nathelper (no periodic pinging needed in the rig) -----
modparam("nathelper", "natping_interval", 0)
# fix_nated_register() stashes the received URI in this AVP; registrar saves it.
# Both modules must agree on the AVP name.
modparam("nathelper|registrar", "received_avp", "$avp(RECEIVED)")

# ----- rtpengine: ng control on rtpengine's internal leg -----
modparam("rtpengine", "rtpengine_sock", "udp:172.30.20.20:2223")

# ----- tls -----
modparam("tls", "config", "/etc/kamailio/tls.cfg")

# ----- websocket -----
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)

####### Routing Logic #########

request_route {
    route(FROMINTERNAL);
    $var(ev) = "incoming request"; route(XLOG);

    route(REQINIT);

    # handle WebSocket / NAT detection
    route(NATDETECT);

    # CANCEL / in-dialog
    if (is_method("CANCEL")) {
        if (t_check_trans()) { route(RELAY); }
        exit;
    }
    route(WITHINDLG);

    # only initial requests beyond this point
    if (!is_method("REGISTER")) {
        remove_hf("Route");
    }

    # REGISTER -> authenticate + save location
    if (is_method("REGISTER")) {
        route(AUTH);
        route(REGISTRAR);
        exit;
    }

    # Only handle our own domain
    if (!is_method("INVITE|ACK|BYE|CANCEL|OPTIONS|INFO|UPDATE|MESSAGE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # authenticate calls originating from our subscribers
    route(AUTH);

    if (is_method("INVITE")) {
        if (!has_totag()) {
            record_route();
        }
    }

    # Special service URIs -> Asterisk (internal net)
    if (is_method("INVITE") && $rU =~ "^(moh|voicemail|ivr|attendant|ooo)$") {
        $du = "APP_SOCK";
        $var(ev) = "routing service URI '$rU' to app server (Asterisk)"; route(XLOG);
        route(SETBRIDGE);
        route(RTPENGINE);
        route(RELAY);
        exit;
    }

    # Normal user-to-user: look up the callee's registration
    route(LOCATION);
}

# ---- structured logging helpers -------------------------------------------
# Set $var(ev) to the event text, then route(XLOG) for requests / route(XLOGRPL)
# for replies. Format:
#   requests: "<event>, m=METHOD, cid=..., raddr=ip:port, ruri=..., duri=..."
#   replies:  "<event>, r=CODE-REASON, m=METHOD, cid=..., raddr=ip:port"
route[XLOG] {
    xlog("L_INFO", "$var(ev), m=$rm, cid=$ci, raddr=$si:$sp, ruri=$ru, duri=$du\n");
}
route[XLOGRPL] {
    xlog("L_INFO", "$var(ev), r=$rs-$rr, m=$rm, cid=$ci, raddr=$si:$sp\n");
}

# Classify the peer: set $var(from_internal)=1 when the message arrived from an
# internal-network IP, else 0. Called first in both the request and reply routes
# so the rest of the script never has to test IP literals.
route[FROMINTERNAL] {
    $var(from_internal) = 0;
    if ($si =~ INTERNAL_NET_RE) {
        $var(from_internal) = 1;
    }
}

# Log every reply that passes through the proxy.
onreply_route {
    route(FROMINTERNAL);
    $var(ev) = "incoming reply"; route(XLOGRPL);
}

route[REQINIT] {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "malformed request from $si:$sp\n");
        exit;
    }
}

route[NATDETECT] {
    force_rport();
    if (proto == WS || proto == WSS) {
        setflag(FLT_WS);
    }
    # Treat WebSocket clients like NATed UAs: rewrite the REGISTER contact, or add
    # a connection alias to initial INVITEs so we can route back over the same
    # socket. Do this exactly ONCE — calling set_contact_alias() twice errors out.
    if (nat_uac_test("19") || isflagset(FLT_WS)) {
        setflag(FLT_NATS);
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else if (is_method("INVITE") && !has_totag()) {
            set_contact_alias();
        }
    }
}

route[WITHINDLG] {
    if (!has_totag()) return;
    if (loose_route()) {
        $var(ev) = "in-dialog request, loose-routed"; route(XLOG);
        route(DLGURI);
        if (is_method("BYE")) {
            setflag(FLT_NATS);
            route(RTPENGINE);
        } else if (is_method("ACK")) {
            route(SETBRIDGE);
            route(RTPENGINE);
        } else if (is_method("INVITE")) {
            record_route();
            route(SETBRIDGE);
            route(RTPENGINE);
        }
        route(RELAY);
        exit;
    }
    if (is_method("ACK")) {
        if (t_check_trans()) {
            $var(ev) = "in-dialog ACK, matched transaction"; route(XLOG);
            route(RELAY);
        }
        exit;
    }
    $var(ev) = "in-dialog request, not loose-routed (strict/stray) -> 404"; route(XLOG);
    sl_send_reply("404", "Not Here");
    exit;
}

route[DLGURI] {
    if (!isdsturiset()) {
        handle_ruri_alias();
    }
}

# Authenticate requests from our subscribers (REGISTER, and INVITE from local users)
route[AUTH] {
    if (is_method("REGISTER") || (from_uri =~ "@MYDOMAIN")) {
        $var(ev) = "authentication required"; route(XLOG);
        if (!auth_check("$fd", "subscriber", "1")) {
            if ($au != $null) {
                $var(ev) = "authentication FAILED for '$au' (bad credentials)"; route(XLOG);
            } else {
                $var(ev) = "no credentials present, sending auth challenge"; route(XLOG);
            }
            auth_challenge("$fd", "0");
            exit;
        }
        $var(ev) = "authentication OK for '$au'"; route(XLOG);
        # do not pass credentials to the next hop
        if (!is_method("ACK|CANCEL")) {
            consume_credentials();
        }
    }
}

route[REGISTRAR] {
    if (!save("location")) {
        sl_reply_error();
        exit;
    }
    $var(ev) = "registration saved, '$tu' is now online"; route(XLOG);
    exit;
}

route[LOCATION] {
    if (!lookup("location")) {
        $var(rc) = $rc;
        if ($var(rc) == -1 || $var(rc) == -3) {
            $var(ev) = "callee '$rU' not registered (offline) -> 404"; route(XLOG);
            t_newtran();
            t_reply("404", "Not Found");
            exit;
        } else if ($var(rc) == -2) {
            $var(ev) = "callee '$rU' found but method not allowed -> 405"; route(XLOG);
            sl_send_reply("405", "Method Not Allowed");
            exit;
        }
    }
    # lookup() rewrote R-URI to the registered contact (WS contacts carry an alias)
    $var(ev) = "callee '$rU' online, routing to registered contact"; route(XLOG);
    route(SETBRIDGE);
    route(RTPENGINE);
    route(RELAY);
    exit;
}

# Decide whether this call needs WebRTC<->SIP bridging: one leg is a WebSocket
# client and the other is not. Sets the FLB_RTPWS branch flag (visible to the
# request branch and its replies). Call AFTER the destination is known (after
# $du is set / lookup() rewrote the R-URI).
route[SETBRIDGE] {
    if ($proto =~ "ws" && !($ru =~ "transport=ws")) {
        setbflag(FLB_RTPWS);          # from web -> SIP
    } else if (!($proto =~ "ws") && $ru =~ "transport=ws") {
        setbflag(FLB_RTPWS);          # from SIP -> web
    }
}

# rtpengine media handling. Two jobs at once:
#  1. bridge RTP between the external and internal docker nets via the named
#     rtpengine interfaces (direction= ext/int, set on the offer).
#  2. transcode between WebRTC (DTLS-SRTP / RTP/SAVPF / ICE / rtcp-mux) and plain
#     SIP (RTP/AVP) when FLB_RTPWS is set. Flags inspired by havfo/WEBRTC-to-SIP:
#     the side facing the WebRTC client gets DTLS=passive ICE=force RTP/SAVPF
#     rtcp-mux-offer generate-mid; the side facing plain SIP gets DTLS=off
#     ICE=remove RTP/AVP rtcp-mux-demux. Which side a given message faces is
#     determined by $proto (the transport it arrived on), so the same logic is
#     correct for the offer (request) and the answer (reply).
route[RTPENGINE] {
    if (is_method("BYE")) {
        rtpengine_delete();
        return;
    }
    if (!(is_method("INVITE|UPDATE|ACK") || is_reply())) return;
    if (!has_body("application/sdp")) return;

    # (replace-session-connection is implicit in rtpengine mr26+, so just origin)
    $var(f) = "replace-origin trust-address";

    # interface bridging across the two docker networks — only meaningful on the
    # offer; rtpengine remembers it for the answer. caller side = where the offer
    # came from (from_internal); callee side = where it's going ($dd).
    if (is_request()) {
        $var(cli) = "ext";
        if ($var(from_internal) == 1) { $var(cli) = "int"; }
        $var(srv) = "ext";
        if ($dd =~ INTERNAL_NET_RE) { $var(srv) = "int"; }
        $var(f) = $var(f) + " direction=" + $var(cli) + " direction=" + $var(srv);
    }

    if (isbflagset(FLB_RTPWS)) {
        if ($proto =~ "ws") {
            # arrived from the WebRTC client -> emit plain RTP/AVP toward SIP
            $var(f) = $var(f) + " rtcp-mux-demux DTLS=off SDES-off ICE=remove RTP/AVP";
        } else {
            # arrived from plain SIP -> emit DTLS-SRTP/SAVPF/ICE toward the web client
            $var(f) = $var(f) + " rtcp-mux-offer generate-mid DTLS=passive SDES-off ICE=force RTP/SAVPF";
        }
    }

    rtpengine_manage($var(f));
}

route[RELAY] {
    if (is_method("INVITE|UPDATE")) {
        t_on_branch("MANAGE_BRANCH");
        t_on_reply("MANAGE_REPLY");
        t_on_failure("MANAGE_FAILURE");
    }
    # last log before the request leaves the proxy (duri/ruri = where it's going)
    $var(ev) = "relaying request to next hop"; route(XLOG);
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

branch_route[MANAGE_BRANCH] {
    xlog("L_DBG", "[$ci] new branch [$T_branch_idx] to $ru\n");
}

onreply_route[MANAGE_REPLY] {
    # rewrite the answer SDP with the correct per-leg WebRTC/SIP flags
    if (status =~ "(180|183|2[0-9][0-9])" && has_body("application/sdp")) {
        route(RTPENGINE);
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) { exit; }
}

####### WebSocket handling (xhttp upgrade on the WSS listener) #########
event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();

    if ($Rp != 8443) {
        xhttp_reply("403", "Forbidden", "text/plain", "Only WSS on 8443");
        exit;
    }
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade" && $rm =~ "GET") {
        if (ws_handle_handshake()) { exit; }
    }
    xhttp_reply("404", "Not Found", "text/plain", "");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection closed: $si:$sp\n");
}
