#!KAMAILIO
#
# voip-test-rig — Kamailio SIP proxy
# ----------------------------------
# - REGISTER + MySQL digest auth (subscriber table), user location (usrloc)
# - routes the special service URIs moh/voicemail/ivr/attendant/ooo to Asterisk
# - bridges media via rtpengine between the external and internal docker networks
# - terminates WSS (secure WebSocket) for the sip.js web client
#
# The IP addresses below are the FIXED docker-compose addresses. Keep them in
# sync with docker-compose.yml and the SANs in certs/gen-certs.sh.
#   external leg (agents, webapp): 172.30.10.10
#   internal leg (toward Asterisk): 172.30.20.10
#   rtpengine ng control:          172.30.20.20:2223
#   Asterisk:                      172.30.20.30:5060
#   mysql:                         172.30.20.40

#!substdef "!MYDOMAIN!rig.local!g"
#!substdef "!DBURL!mysql://kamailio:kamailiopw@172.30.20.40/kamailio!g"
#!substdef "!APP_SOCK!sip:172.30.20.30:5060!g"

#!define FLT_NATS 5
#!define FLT_WS   2
#!define FLB_NATB 6

####### Global Parameters #########
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=yes
children=4

/* SIP signaling on the external leg (agents + webapp) */
listen=udp:172.30.10.10:5060 advertise 172.30.10.10:5060
listen=tcp:172.30.10.10:5060
listen=tls:172.30.10.10:5061
listen=tls:172.30.10.10:8443   # WSS for the web client
/* internal leg toward Asterisk */
listen=udp:172.30.20.10:5060

enable_tls=yes
tcp_connection_lifetime=3605
tcp_accept_no_cl=yes
tcp_rd_buf_size=16384
auto_aliases=no
server_header="Server: voip-test-rig"

####### Modules #########
# (module path uses the package's compiled-in default, arch-independent)

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "db_mysql.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "tls.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"

####### Module Parameters #########
# ----- ctl (kamcmd binrpc socket) -----
modparam("ctl", "binrpc", "unix:/run/kamailio/kamailio_ctl")

# ----- tm / rr -----
modparam("tm", "failure_reply_mode", 3)
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

# ----- registrar / usrloc (MySQL, domain-aware) -----
modparam("usrloc", "db_url", "DBURL")
modparam("usrloc", "db_mode", 1)
modparam("usrloc", "use_domain", 1)
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)

# ----- auth / auth_db: ha1 stored in DB (MD5(user:domain:pass)) -----
modparam("auth_db", "db_url", "DBURL")
modparam("auth_db", "calculate_ha1", 0)
modparam("auth_db", "password_column", "ha1")
modparam("auth_db", "use_domain", 1)
modparam("auth_db", "load_credentials", "")

# ----- nathelper (no periodic pinging needed in the rig) -----
modparam("nathelper", "natping_interval", 0)
# fix_nated_register() stashes the received URI in this AVP; registrar saves it.
# Both modules must agree on the AVP name.
modparam("nathelper|registrar", "received_avp", "$avp(RECEIVED)")

# ----- rtpengine: ng control on rtpengine's internal leg -----
modparam("rtpengine", "rtpengine_sock", "udp:172.30.20.20:2223")

# ----- tls -----
modparam("tls", "config", "/etc/kamailio/tls.cfg")

# ----- websocket -----
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)

####### Routing Logic #########

request_route {
    route(REQINIT);

    # handle WebSocket / NAT detection
    route(NATDETECT);

    # CANCEL / in-dialog
    if (is_method("CANCEL")) {
        if (t_check_trans()) { route(RELAY); }
        exit;
    }
    route(WITHINDLG);

    # only initial requests beyond this point
    if (!is_method("REGISTER")) {
        remove_hf("Route");
    }

    # REGISTER -> authenticate + save location
    if (is_method("REGISTER")) {
        route(AUTH);
        route(REGISTRAR);
        exit;
    }

    # Only handle our own domain
    if (!is_method("INVITE|ACK|BYE|CANCEL|OPTIONS|INFO|UPDATE|MESSAGE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # authenticate calls originating from our subscribers
    route(AUTH);

    if (is_method("INVITE")) {
        if (!has_totag()) {
            record_route();
        }
    }

    # Special service URIs -> Asterisk (internal net)
    if (is_method("INVITE") && $rU =~ "^(moh|voicemail|ivr|attendant|ooo)$") {
        xlog("L_INFO", "[$ci] routing service URI '$rU' to Asterisk\n");
        $du = "APP_SOCK";
        route(RTPENGINE);
        route(RELAY);
        exit;
    }

    # Normal user-to-user: look up the callee's registration
    route(LOCATION);
}

route[REQINIT] {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "malformed request from $si:$sp\n");
        exit;
    }
}

route[NATDETECT] {
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else if (!is_method("CANCEL")) {
            set_contact_alias();
        }
        setflag(FLT_NATS);
    }
    if (proto == WS || proto == WSS) {
        setflag(FLT_WS);
        # WebSocket contacts are not routable directly; use the connection
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else if (!is_method("CANCEL")) {
            set_contact_alias();
        }
    }
}

route[WITHINDLG] {
    if (!has_totag()) return;
    if (loose_route()) {
        route(DLGURI);
        if (is_method("BYE")) {
            setflag(FLT_NATS);
        } else if (is_method("ACK")) {
            route(RTPENGINE);
        } else if (is_method("INVITE")) {
            record_route();
            route(RTPENGINE);
        }
        route(RELAY);
        exit;
    }
    if (is_method("ACK")) {
        if (t_check_trans()) { route(RELAY); }
        exit;
    }
    sl_send_reply("404", "Not Here");
    exit;
}

route[DLGURI] {
    if (!isdsturiset()) {
        handle_ruri_alias();
    }
}

# Authenticate requests from our subscribers (REGISTER, and INVITE from local users)
route[AUTH] {
    if (is_method("REGISTER") || (from_uri =~ "@MYDOMAIN")) {
        if (!auth_check("$fd", "subscriber", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        # do not pass credentials to the next hop
        if (!is_method("ACK|CANCEL")) {
            consume_credentials();
        }
    }
}

route[REGISTRAR] {
    if (!save("location")) {
        sl_reply_error();
    }
    xlog("L_INFO", "[$ci] registered $fu (contact $ct)\n");
    exit;
}

route[LOCATION] {
    if (!lookup("location")) {
        $var(rc) = $rc;
        if ($var(rc) == -1 || $var(rc) == -3) {
            t_newtran();
            t_reply("404", "Not Found");
            exit;
        } else if ($var(rc) == -2) {
            sl_send_reply("405", "Method Not Allowed");
            exit;
        }
    }
    # destination may be a WS-registered contact: restore its connection
    route(RTPENGINE);
    route(RELAY);
    exit;
}

# rtpengine media bridging: pick the in/out interfaces so RTP is relayed between
# the external and internal networks, and translate to/from WebRTC when a leg is
# a WebSocket client. The direction= flags are the load-bearing part for bridging.
route[RTPENGINE] {
    if (!(is_method("INVITE|ACK|UPDATE|BYE"))) return;

    # caller side: which local socket received the request
    $var(cli) = "ext";
    if ($Ri == "172.30.20.10") { $var(cli) = "int"; }

    # callee side: internal if the destination host is on the internal subnet
    $var(srv) = "ext";
    if ($dd =~ "^172\.30\.20\.") { $var(srv) = "int"; }

    $var(dir) = "direction=" + $var(cli) + " direction=" + $var(srv);

    if (is_method("BYE")) {
        rtpengine_delete();
        return;
    }

    if (isflagset(FLT_WS)) {
        # offer comes FROM a WebRTC client -> present plain RTP to the far side
        rtpengine_manage("trust-address replace-origin replace-session-connection ICE=remove RTP/AVP " + $var(dir));
    } else if ($du =~ "transport=ws" || $ru =~ "transport=ws") {
        # far side IS a WebRTC client -> present DTLS-SRTP/SAVPF/ICE
        rtpengine_manage("trust-address replace-origin replace-session-connection ICE=force RTP/SAVPF DTLS=passive " + $var(dir));
    } else {
        # plain SIP <-> SIP, just relay/bridge between the two nets
        rtpengine_manage("replace-origin replace-session-connection " + $var(dir));
    }
}

route[RELAY] {
    if (is_method("INVITE|UPDATE")) {
        t_on_branch("MANAGE_BRANCH");
        t_on_reply("MANAGE_REPLY");
        t_on_failure("MANAGE_FAILURE");
    }
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

branch_route[MANAGE_BRANCH] {
    xlog("L_DBG", "[$ci] new branch [$T_branch_idx] to $ru\n");
}

onreply_route[MANAGE_REPLY] {
    # rewrite the answer SDP (rtpengine remembers the offer context per call)
    if (status =~ "(180|183|2[0-9][0-9])" && has_body("application/sdp")) {
        rtpengine_manage();
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) { exit; }
}

####### WebSocket handling (xhttp upgrade on the WSS listener) #########
event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();

    if ($Rp != 8443) {
        xhttp_reply("403", "Forbidden", "text/plain", "Only WSS on 8443");
        exit;
    }
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade" && $rm =~ "GET") {
        if (ws_handle_handshake()) { exit; }
    }
    xhttp_reply("404", "Not Found", "text/plain", "");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection closed: $si:$sp\n");
}
