# Serves the static SIP-over-WebRTC client over HTTPS. The WSS signaling goes
# directly from the browser to Kamailio (wss://kamailio.rig.local:8443), not
# through nginx — this server only ships the page. WebRTC getUserMedia requires
# a secure context, hence HTTPS here.
server {
    listen 443 ssl;
    server_name webapp.rig.local;

    ssl_certificate     /rig-certs/server-chain.crt;
    ssl_certificate_key /rig-certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
