name: VoIP rig CI

# Edit any config (kamailio.cfg, rtpengine.conf, asterisk/*, webapp/*, …) and
# push (or open a PR): this stands up the full rig, launches Sipfront agents
# into it, and runs the rig's Sipfront tests against it.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  AGENT_COUNT: "2"

jobs:
  rig:
    name: Build rig, run agents, test with Sipfront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate on-demand CA + server certs
        run: bash certs/gen-certs.sh

      - name: Build and start the rig
        run: docker compose up -d --build

      - name: Wait for the rig to be ready
        run: bash scripts/wait-for-rig.sh

      # All rig containers are up — now launch the agents into the external net.
      - name: Launch Sipfront agents
        env:
          SF_POOL_ID: ${{ secrets.SF_POOL_ID }}
          SF_POOL_SECRET: ${{ secrets.SF_POOL_SECRET }}
        run: bash scripts/launch-agents.sh "${AGENT_COUNT}"

      - name: Settle (let agents connect to the Sipfront cloud)
        run: sleep 25

      - name: Test — basic call alice to bob
        id: test_ab
        if: ${{ !cancelled() }}
        uses: sipfront/action-call-test@d5cce5b9876a0bdf69642560d8e317f6b2309402
        with:
          public_key: ${{ secrets.SF_API_PUBLIC_KEY }}
          secret_key: ${{ secrets.SF_API_SECRET_KEY }}
          sf_environment: dev
          mode: test
          name: basic call alice to bob
          report_mode: kiosk

      - name: Test — basic call alice to asterisk-ooo
        id: test_ooo
        if: ${{ !cancelled() }}
        uses: sipfront/action-call-test@d5cce5b9876a0bdf69642560d8e317f6b2309402
        with:
          public_key: ${{ secrets.SF_API_PUBLIC_KEY }}
          secret_key: ${{ secrets.SF_API_SECRET_KEY }}
          sf_environment: dev
          mode: test
          name: basic call alice to asterisk-ooo
          report_mode: kiosk

      - name: Report
        if: ${{ !cancelled() }}
        run: |
          {
            echo "### Sipfront rig tests"
            echo "- **alice → bob**: ${{ steps.test_ab.outputs.status || 'n/a' }} — ${{ steps.test_ab.outputs.report_url }}"
            echo "- **alice → asterisk-ooo**: ${{ steps.test_ooo.outputs.status || 'n/a' }} — ${{ steps.test_ooo.outputs.report_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect logs
        if: ${{ always() }}
        run: |
          mkdir -p rig-logs
          docker compose logs --no-color > rig-logs/compose.log 2>&1 || true
          for i in $(seq 1 "${AGENT_COUNT}"); do
            docker logs "sf-agent-${i}" > "rig-logs/sf-agent-${i}.log" 2>&1 || true
          done

      - name: Upload logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rig-logs
          path: rig-logs/
          if-no-files-found: ignore

      - name: Tear down
        if: ${{ always() }}
        run: |
          for i in $(seq 1 "${AGENT_COUNT}"); do docker rm -f "sf-agent-${i}" || true; done
          docker compose down -v || true
