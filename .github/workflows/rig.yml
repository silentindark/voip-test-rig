name: VoIP rig CI

# Edit any config (kamailio.cfg, rtpengine.conf, asterisk/*, webapp/*, …) and
# push: this stands up the full rig, launches Sipfront agents into it, and runs
# the rig's Sipfront tests against it.
#
# Push only (no pull_request): a PR on a same-repo branch would otherwise trigger
# a second run that the concurrency group cancels, and a cancelled run is
# reported as a failed check on the PR. One run per push keeps the status clean.
on:
  push:
    branches: ["**"]
  workflow_dispatch:        # manual "Run workflow" button
    inputs:
      agent_count:
        description: "Number of Sipfront agents to launch"
        default: "2"

# A new push cancels any still-running run for the same branch (avoids two rigs
# fighting over the same agent pool).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AGENT_COUNT: ${{ github.event.inputs.agent_count || '2' }}

jobs:
  rig:
    name: Build components, launch test-rig, test with Sipfront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate on-demand CA + server certs
        run: bash certs/gen-certs.sh

      - name: Build and start the rig
        run: docker compose up -d --build

      - name: Wait for the rig to be ready
        run: bash scripts/wait-for-rig.sh

      # All rig containers are up — now launch the agents into the external net.
      - name: Launch Sipfront agents
        env:
          SF_POOL_ID: ${{ secrets.SF_POOL_ID }}
          SF_POOL_SECRET: ${{ secrets.SF_POOL_SECRET }}
        run: bash scripts/launch-agents.sh "${AGENT_COUNT}"

      - name: Settle (let agents connect to the Sipfront cloud)
        run: sleep 25

      # ===================================================================
      # TEMPORARY: iterating on the codec-transcoding fix. Run ONLY the
      # single codec tests on each push for fast feedback. Revert this whole
      # block to the project run below once the codec tests are green.
      # ===================================================================
      - name: "TEMP — Codec Test: Opus"
        id: test_opus
        if: ${{ !cancelled() }}
        uses: sipfront/action-call-test@v1.0.1
        with:
          public_key: ${{ secrets.SF_API_PUBLIC_KEY }}
          secret_key: ${{ secrets.SF_API_SECRET_KEY }}
          sf_environment: dev
          mode: test
          name: "Codec Test: Opus"
          report_mode: kiosk

      - name: "TEMP — Codec Test: G.722"
        id: test_g722
        if: ${{ !cancelled() }}
        uses: sipfront/action-call-test@v1.0.1
        with:
          public_key: ${{ secrets.SF_API_PUBLIC_KEY }}
          secret_key: ${{ secrets.SF_API_SECRET_KEY }}
          sf_environment: dev
          mode: test
          name: "Codec Test: G.722"
          report_mode: kiosk

      - name: Report
        if: ${{ !cancelled() }}
        run: |
          {
            echo "### TEMP — codec tests"
            echo "- **Opus**: ${{ steps.test_opus.outputs.status || 'n/a' }} — ${{ steps.test_opus.outputs.result_description }} — ${{ steps.test_opus.outputs.report_url }}"
            echo "- **G.722**: ${{ steps.test_g722.outputs.status || 'n/a' }} — ${{ steps.test_g722.outputs.result_description }} — ${{ steps.test_g722.outputs.report_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # --- Restore this when the Opus test passes (delete the TEMP block above) ---
      # - name: Run project — voip-test-rig
      #   id: project_run
      #   if: ${{ !cancelled() }}
      #   uses: sipfront/action-call-test@v1.0.1
      #   with:
      #     public_key: ${{ secrets.SF_API_PUBLIC_KEY }}
      #     secret_key: ${{ secrets.SF_API_SECRET_KEY }}
      #     sf_environment: dev
      #     mode: project
      #     project_name: voip-test-rig
      #     report_mode: kiosk
      #
      # - name: Report
      #   if: ${{ !cancelled() }}
      #   run: |
      #     {
      #       echo "### Sipfront project run — voip-test-rig"
      #       echo "- **status**: ${{ steps.project_run.outputs.status || 'n/a' }}"
      #       echo "- **tests started**: ${{ steps.project_run.outputs.tests_started || '?' }}/${{ steps.project_run.outputs.total_tests || '?' }}"
      #       echo "- **report**: ${{ steps.project_run.outputs.report_url }}"
      #     } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect logs
        if: ${{ always() }}
        run: |
          mkdir -p rig-logs
          docker compose logs --no-color > rig-logs/compose.log 2>&1 || true
          for i in $(seq 1 "${AGENT_COUNT}"); do
            docker logs "sf-agent-${i}" > "rig-logs/sf-agent-${i}.log" 2>&1 || true
          done

      - name: Upload logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: rig-logs
          path: rig-logs/
          if-no-files-found: ignore

      - name: Tear down
        if: ${{ always() }}
        run: |
          for i in $(seq 1 "${AGENT_COUNT}"); do docker rm -f "sf-agent-${i}" || true; done
          docker compose down -v || true
